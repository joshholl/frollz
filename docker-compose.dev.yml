# Development environment — API and UI run as separate containers with hot
# reloading. The Vite dev server proxies /api to the API container, so no
# nginx reverse proxy is needed.
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up -d

services:
  frollz-api:
    build:
      context: ./frollz-api
      dockerfile: Dockerfile
      target: development
    container_name: frollz-api
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./frollz-api:/app
      - /app/node_modules
    networks:
      - frollz-network
    command: npm run start:dev
    restart: unless-stopped

  frollz-ui:
    build:
      context: ./frollz-ui
      dockerfile: Dockerfile
      target: development
    container_name: frollz-ui
    environment:
      - VITE_API_URL=/api
      # Vite proxy target — routes /api requests from the browser to the API
      # container via Docker internal networking (not exposed to the host).
      - API_PROXY_TARGET=http://frollz-api:3000
    ports:
      - "5173:5173"
    depends_on:
      - frollz-api
    volumes:
      - ./frollz-ui:/app
      - /app/node_modules
    networks:
      - frollz-network
    command: npm run dev
    restart: unless-stopped

  lhci-server:
    image: patrickhulce/lhci-server
    container_name: frollz-lhci
    ports:
      - "${LHCI_PORT:-9001}:9001"
    environment:
      - LHCI_STORAGE__SQL_DIALECT=sqlite
      - LHCI_STORAGE__SQL_DATABASE_PATH=/data/lhci.db
    volumes:
      - lhci_data:/data
    networks:
      - frollz-network
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: frollz-postgres
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - frollz-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DATABASE_USER}@localhost.com
      PGADMIN_DEFAULT_PASSWORD: ${DATABASE_PASSWORD}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_DISABLE_POSTFIX: "True"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8080:80" # Access pgAdmin in your browser at http://localhost:8080
    networks:
      - frollz-network
    depends_on:
      - postgres # Ensure PostgreSQL starts before pgAdmin
    entrypoint: >
      /bin/sh -c "echo \"$PGADMIN_PGPASS\" >> /root/.ogpass; chmod 600 /pgpass; echo '$PGADMIN_SERVER_JSON' >> /pgadmin4/servers.json; /entrypoint.sh"
volumes:
  postgres_data:
  lhci_data:

networks:
  frollz-network:
    driver: bridge
