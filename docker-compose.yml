services:
  nginx:
    image: nginx:alpine
    container_name: frollz-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frollz-ui
      - frollz-api
    networks:
      - frollz-network
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: frollz-postgres
    environment:
      - POSTGRES_DB=frollz
      - POSTGRES_USER=frollz
      - POSTGRES_PASSWORD=frollz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frollz-network
    restart: unless-stopped

  frollz-api:
    build:
      context: ./frollz-api
      dockerfile: Dockerfile
    container_name: frollz-api
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=frollz
      - POSTGRES_USER=frollz
      - POSTGRES_PASSWORD=frollz
      - PORT=3000
      - DISABLE_DEFAULT_DATA_IMPORT=false
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./frollz-api:/app
      - /app/node_modules
    networks:
      - frollz-network
    command: npm run start:dev
    restart: unless-stopped

  frollz-ui:
    build:
      context: ./frollz-ui
      dockerfile: Dockerfile
      target: development
    container_name: frollz-ui
    environment:
      - VITE_API_URL=/api
    ports:
      - "5173:5173"
    depends_on:
      - frollz-api
    networks:
      - frollz-network
    command: npm run dev
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  frollz-network:
    driver: bridge
