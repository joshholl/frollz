# Production deployment — single frollz container + PostgreSQL.
# Copy .env.example to .env and fill in values before running.
#
# Recommended: place a reverse proxy (Nginx Proxy Manager, Traefik, Caddy)
# in front of this container to handle HTTPS/TLS termination.
#
# Usage:
#   docker-compose pull && docker-compose up -d

services:
  frollz:
    image: ghcr.io/joshholl/frollz:latest
    container_name: frollz
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    depends_on:
      - postgres
    networks:
      - frollz-network
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: frollz-postgres
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - frollz-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  frollz-network:
    driver: bridge
