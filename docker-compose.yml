services:
  nginx:
    image: nginx:alpine
    container_name: frollz-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frollz-ui
      - frollz-api
    networks:
      - frollz-network
    restart: unless-stopped

  arangodb:
    image: arangodb:3.11
    container_name: frollz-arangodb
    environment:
      - ARANGO_ROOT_PASSWORD=rootpassword
      - ARANGO_DB=frollz
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
    networks:
      - frollz-network
    restart: unless-stopped

  frollz-api:
    build:
      context: ./frollz-api
      dockerfile: Dockerfile
    container_name: frollz-api
    environment:
      - NODE_ENV=development
      - ARANGODB_URL=http://arangodb:8529
      - ARANGODB_DATABASE=frollz
      - ARANGODB_USERNAME=root
      - ARANGODB_PASSWORD=rootpassword
      - PORT=3000
      - DISABLE_DEFAULT_DATA_IMPORT=false
    ports:
      - "3000:3000"
    depends_on:
      - arangodb
    volumes:
      - ./frollz-api:/app
      - /app/node_modules
    networks:
      - frollz-network
    command: npm run start:dev
    restart: unless-stopped

  frollz-ui:
    build:
      context: ./frollz-ui
      dockerfile: Dockerfile
      target: development
    container_name: frollz-ui
    environment:
      - VITE_API_URL=/api
    ports:
      - "5173:5173"
    depends_on:
      - frollz-api
    networks:
      - frollz-network
    command: npm run dev
    restart: unless-stopped

volumes:
  arangodb_data:
  arangodb_apps:

networks:
  frollz-network:
    driver: bridge