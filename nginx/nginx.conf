map $http_upgrade $connection_upgrade {
    default    '';
    websocket  upgrade;
    ''         close;
}

# Only allow websocket upgrades — prevents H2C smuggling via attacker-controlled Upgrade headers
map $http_upgrade $filtered_upgrade {
    websocket  $http_upgrade;
    default    '';
}

server {
    listen 80;
    server_name localhost;

    # Serve UI static files
    location / {
        proxy_pass http://frollz-ui:5173;
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR — only upgrades when client sends Upgrade: websocket
        # $filtered_upgrade map above restricts upgrades to websocket only, mitigating H2C smuggling
        proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_set_header Upgrade $filtered_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://frollz-api:3000/api/;
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
